<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ data.device[1] }}</title>
	<!-- Bootstrap CSS for responsive design -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Leaflet CSS for maps -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
	<!-- jQuery -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<!-- Leaflet JS -->
	<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
	<!-- Bootstrap Bundle JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	
	<style>
		/* Ensure the map fills the container responsively */
		#map {
			width: 100%;
			height: 400px;
		}
	</style>
</head>

<body>
	<div class="container my-4">
		<h1 class="mb-4">{{ data.device[1] }}</h1>
        <span id="download_holder">
            <div id="download" style="display: flex; flex-direction: row; align-items: center;">
                <h3 class="mb-4">Download report as: </h3> &nbsp;
                <button class="btn btn-primary mb-4" onclick="download_PDF()">PDF</button> &nbsp;
                <button class="btn btn-primary mb-4" onclick="download_HTML()">HTML</button>
            </div>
        </span>
       
        <script>
            function download_PDF() {
                var downloadDiv = document.getElementById('download');
                var download_div = downloadDiv.cloneNode(true);
                downloadDiv.parentNode.removeChild(downloadDiv);
                print();
                // Re-append the download button after printing to the document where it was removed
                var download_holder = document.getElementById('download_holder');
                download_holder.appendChild(download_div);
            }
            function download_HTML() {
                var downloadDiv = document.getElementById('download');
                var download_div = downloadDiv.cloneNode(true);
                downloadDiv.parentNode.removeChild(downloadDiv);

                var blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
                var link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'report.html';
                link.click();
                URL.revokeObjectURL(link.href);
                var download_holder = document.getElementById('download_holder');
                download_holder.appendChild(download_div);
            }
        </script>
		<table id="device-info-table" class="table table-bordered">
			<tr>
				<td><strong>MAC Address</strong>: {{ data.device[2] }}</td>
				<td><strong>Manufacturer</strong>: {{ data.device[3] }}</td>
			</tr>
			<tr>
				<td colspan="2"><strong>SSID Channels</strong>: {{ data.ssid_channels }}</td>
			</tr>
			<tr>
				<td colspan="2"><strong>Encryption</strong>: {{ data.device[6] }}</td>
			</tr> <!-- New row for address (populated by reverse geocoding) -->
			<tr id="address-row" style="display: none;">
				<td colspan="2"><strong>Address</strong>: <span id="address"></span></td>
			</tr>
			{% if data.tests %}
			<tr>
				<td colspan="2"><strong>Tests</strong>: {{ data.tests | safe }}</td>
			</tr>
			{% endif %}
		</table>

		<!-- Frequency map as base64 image -->
		<div id="freq-chart" class="mb-4">
			<img src="data:image/png;base64,{{ data.freq_chart }}" alt="Frequency Map" class="img-fluid">
		</div>

		<!-- Map container; will be shown only if internet is available -->
		<div id="map-container" class="mb-4">
			<div id="map"></div>
		</div>
	</div>
	<script>
		// Only initialize the map and perform reverse geocoding if an internet connection is detected.
		if (navigator.onLine) {
			// Use device latitude and longitude; if not available, default to 0.
			var lat = {{ data.device[7] or 0 }};
			var lon = {{ data.device[8] or 0 }};
			// Initialize the Leaflet map.
            if (lat == 0 && lon == 0) {
                document.getElementById("map-container").style.display = "none";
            } else {
                document.getElementById("map-container").style.display = "block";
            }
			var map = L.map('map').setView([lat, lon], 13);
			L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
			L.marker([lat, lon]).addTo(map);
			// Reverse geocoding with Nominatim free service.
			$.ajax({
				//url: 'https://nominatim.openstreetmap.org/reverse',
				//url: 'http://' + window.location.hostname + '/nominatim/reverse',
                url: 'https://mazurky.eu/nominatim/reverse',
				data: { format: 'json', lat: lat, lon: lon }, success: function (response) {
					if (response && response.display_name) {
						$('#address').text(response.display_name);
						$('#address-row').show();
					}
				}, error: function () { console.log("Reverse geocoding failed."); }
			});
		} else {
			// Hide the map container if there is no internet.
			document.getElementById("map-container").style.display = "none";
		}
	</script>
</body>

</html>
