{% extends "base.html" %}

{% block content %}
<h2>
	Log
</h2>
<style>
	/*https://stackoverflow.com/a/1471500/11995938*/
	pre {
		white-space: pre-wrap; /* css-3 */
		white-space: -moz-pre-wrap !important; /* Mozilla, since 1999 */
		white-space: -pre-wrap; /* Opera 4-6 */
		white-space: -o-pre-wrap; /* Opera 7 */
		word-wrap: break-word; /* Internet Explorer 5.5+ */
	}
</style>
<label style="font-size:0.8em">
	<button id="refresh-btn" style="margin-bottom: 4px;">Refresh</button>
	<input type="checkbox" id="auto-refresh"> Auto refresh
</label>
<div id="log-container" class="log-container">
	<pre id="log-content">{{ log_content }}</pre>
</div>

<script>
	var autoRefreshInterval = null;

	function fetchLog() {
		fetch("{{ url_for('log_data') }}")
			.then(response => response.text())
			.then(text => {
				const logContent = document.getElementById("log-content");
				logContent.textContent = text;
				const container = document.getElementById("log-container");
				container.scrollTop = container.scrollHeight;
			})
			.catch(error => console.error("Error fetching log:", error));
	}

	document.getElementById("refresh-btn").addEventListener("click", function () {
		fetchLog();
	});

	document.getElementById("auto-refresh").addEventListener("change", function () {
		if (this.checked) {
			autoRefreshInterval = setInterval(fetchLog, 1000);
		} else {
			clearInterval(autoRefreshInterval);
		}
	});

	function handleVisibilityChange() {
		if (document.hidden) {
			clearInterval(autoRefreshInterval);
		} else {
			if (document.getElementById("auto-refresh").checked) {
				clearInterval(autoRefreshInterval);
				autoRefreshInterval = setInterval(fetchLog, 1000);
			}
		}
	}

	document.addEventListener("visibilitychange", handleVisibilityChange);

	fetchLog();
</script>

{% endblock %}
